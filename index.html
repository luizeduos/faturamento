<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Declaração de Faturamento</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Bibliotecas Base para PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    @media print {
      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        background-color: white !important;
      }
      @page {
        margin: 0;
      }
      .print-hidden {
        display: none !important;
      }
      #document-page {
        background-image: none !important;
        box-shadow: none !important;
        background-color: white !important;
      }
    }
    
    input:focus {
      border-color: #014167;
      box-shadow: 0 0 0 2px rgba(1, 65, 103, 0.2);
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    /* Container para renderização oculta do PDF */
    #pdf-render-container {
      position: absolute;
      left: -9999px;
      top: 0;
      width: 210mm;
    }
  </style>
</head>
<body class="min-h-screen bg-gray-100 flex flex-col md:flex-row font-sans text-black">

  <!-- PAINEL DE CONTROLE -->
  <div class="w-full md:w-1/3 lg:w-1/4 bg-white border-r shadow-lg flex flex-col print:hidden h-screen overflow-y-auto">
    <div class="p-4 bg-[#014167] text-white flex flex-col gap-3 sticky top-0 z-10 shadow-md">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <i data-lucide="settings" class="w-8 h-8"></i>
          <h1 class="font-bold">Configurações</h1>
        </div>
      </div>
      
      <div class="flex gap-2">
        <button 
          onclick="window.print()"
          class="flex-1 flex items-center justify-center gap-1 bg-white text-[#014167] px-3 py-2 rounded hover:bg-gray-100 transition text-sm font-bold"
        >
          <i data-lucide="printer" class="w-4 h-4"></i> Imprimir
        </button>
        <button 
          id="btn-download"
          onclick="downloadPDF()"
          class="flex-1 flex items-center justify-center gap-1 bg-green-600 text-white px-3 py-2 rounded hover:bg-green-700 transition text-sm font-bold"
        >
          <i data-lucide="download" class="w-4 h-4"></i> <span id="btn-text">Baixar PDF</span>
        </button>
      </div>
    </div>

    <div class="p-4 space-y-6">
      <section>
        <h2 class="text-sm font-bold text-gray-500 uppercase flex items-center gap-2 mb-3 border-b pb-1">
          <i data-lucide="building" class="w-4 h-4"></i> Dados da Empresa
        </h2>
        <div class="space-y-3">
          <input type="text" id="in_empresa" placeholder="Empresa" class="w-full p-2 border rounded text-sm outline-none" />
          <div class="grid grid-cols-2 gap-2">
            <input type="text" id="in_cnpj" placeholder="CNPJ" class="w-full p-2 border rounded text-sm outline-none" />
            <input type="text" id="in_jucesp" placeholder="Jucesp" class="w-full p-2 border rounded text-sm outline-none" />
          </div>
          <div class="grid grid-cols-2 gap-2">
            <input type="text" id="in_ie" placeholder="Insc. Estadual" class="w-full p-2 border rounded text-sm outline-none" />
            <input type="text" id="in_dataAbertura" placeholder="Data" class="w-full p-2 border rounded text-sm outline-none" />
          </div>
          <input type="text" id="in_endereco" placeholder="Endereço" class="w-full p-2 border rounded text-sm outline-none" />
        </div>
      </section>

      <section>
        <h2 class="text-sm font-bold text-gray-500 uppercase flex items-center gap-2 mb-3 border-b pb-1">
          <i data-lucide="file-text" class="w-4 h-4"></i> Meses de Faturamento
        </h2>
        <div id="meses_container"></div>
        <button onclick="addMes()" class="w-full mt-2 py-2 border-2 border-dashed border-gray-300 text-gray-500 rounded hover:bg-gray-50 text-sm font-bold uppercase">
          + Adicionar Mês
        </button>
      </section>

      <section>
        <h2 class="text-sm font-bold text-gray-500 uppercase flex items-center gap-2 mb-3 border-b pb-1">
          <i data-lucide="pen-tool" class="w-4 h-4"></i> Emissão e Assinatura
        </h2>
        <input type="text" id="in_localData" placeholder="Local e Data" class="w-full p-2 border rounded text-sm outline-none mb-2" />
        <div class="bg-blue-50 p-3 rounded border border-blue-100 space-y-2">
          <input type="text" id="in_nomeAssinatura" placeholder="Nome do Cliente" class="w-full p-2 border rounded text-sm outline-none" />
          <div class="flex gap-2">
            <input type="text" id="in_rgAssinatura" placeholder="RG" class="w-2/3 p-2 border rounded text-sm outline-none" />
            <input type="text" id="in_estadoRg" placeholder="UF" class="w-1/3 p-2 border rounded text-sm outline-none uppercase" maxlength="2" />
          </div>
          <input type="text" id="in_cpfAssinatura" placeholder="CPF/CNPJ" class="w-full p-2 border rounded text-sm outline-none" />
        </div>
      </section>
      <div class="pb-10"></div>
    </div>
  </div>

  <!-- ÁREA DO DOCUMENTO -->
  <div id="document-wrapper" class="flex-1 overflow-y-auto bg-gray-300 print:bg-white flex justify-center p-4 sm:p-8 print:p-0">
    <div 
      id="document-page"
      class="bg-white shadow-2xl print:shadow-none relative flex flex-col mx-auto"
      style="width: 210mm; min-height: 297mm; height: 297mm; padding: 35mm 20mm 20mm 20mm; box-sizing: border-box; background-image: url('Timbrado.png'); background-size: 100% 100%; background-position: center; background-repeat: no-repeat; font-family: 'Times New Roman', Times, serif;"
    >
      <div class="text-center mb-6">
        <h1 class="text-[16px] uppercase font-bold">FATURAMENTO</h1>
      </div>

      <div class="mb-6 text-[15px] leading-[1.4]">
        <p><span>Empresa:</span> <span id="out_empresa" class="font-bold"></span></p>
        <p><span>C.N.P.J.:</span> <span id="out_cnpj" class="font-bold"></span></p>
        <p><span>Jucesp:</span> <span id="out_jucesp" class="font-bold"></span></p>
        <p><span>Insc. Estadual:</span> <span id="out_ie" class="font-bold"></span></p>
        <p><span>Data:</span> <span id="out_dataAbertura" class="font-bold"></span></p>
        <p><span>Endereço:</span> <span id="out_endereco" class="font-bold"></span></p>
      </div>

      <div class="mb-6">
        <h2 class="font-bold text-[15px] mb-4 text-center uppercase">RECEITA FISCAL - ÚLTIMOS <span id="out_meses_count"></span> MESES</h2>
        <table class="w-full max-w-[480px] mx-auto text-[15px]">
          <tbody id="out_meses_table"></tbody>
        </table>
      </div>

      <div class="mb-8 text-[15px] font-bold italic text-center" style="font-family: Calibri, sans-serif;">
        <p id="out_localData"></p>
      </div>

      <div class="flex justify-between text-[15px] px-2 pb-4 mt-auto mb-10" style="font-family: Calibri, sans-serif;">
        <div class="w-[250px] flex flex-col items-center text-center">
          <div class="w-full border-t border-black mb-1"></div>
          <p class="font-bold">Reynaldo da Silva Moraes</p>
          <p class="font-bold text-xs uppercase">Contador - CRC: 1SP188092/O-4</p>
        </div>

        <div class="w-[250px] flex flex-col items-center text-center">
          <div class="w-full border-t border-black mb-1"></div>
          <p class="font-bold" id="out_nomeAssinatura"></p>
          <p class="font-bold" id="out_rg_container">RG: <span id="out_rgAssinatura"></span>/<span id="out_estadoRg"></span></p>
          <p class="font-bold"><span id="out_cpf_label">CPF</span>: <span id="out_cpfAssinatura"></span></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { jsPDF } = window.jspdf;

    const state = {
      empresa: 'NOME DA EMPRESA',
      cnpj: '00.000.000/0000-00',
      jucesp: '00.000.000.000',
      ie: '000.000.000.000',
      dataAbertura: '00/00/0000',
      endereco: 'Rua, 00 - Bairro - Cidade/UF',
      localData: 'São Miguel Arcanjo, 05 de Março de 2026',
      meses: [
        { id: 1, mes: 'Dezembro', ano: '2025', valor: '0,00' },
        { id: 2, mes: 'Janeiro', ano: '2026', valor: '0,00' },
        { id: 3, mes: 'Fevereiro', ano: '2026', valor: '0,00' },
        { id: 4, mes: 'Março', ano: '2026', valor: '0,00' },
        { id: 5, mes: 'Abril', ano: '2026', valor: '0,00' },
        { id: 6, mes: 'Maio', ano: '2026', valor: '0,00' },
        { id: 7, mes: 'Junho', ano: '2026', valor: '0,00' },
        { id: 8, mes: 'Julho', ano: '2026', valor: '0,00' },
        { id: 9, mes: 'Agosto', ano: '2026', valor: '0,00' },
        { id: 10, mes: 'Setembro', ano: '2026', valor: '0,00' },
        { id: 11, mes: 'Outubro', ano: '2026', valor: '0,00' },
        { id: 12, mes: 'Novembro', ano: '2026', valor: '0,00' },
      ],
      nomeAssinatura: 'Nome Completo',
      rgAssinatura: '00.000.000-0',
      estadoRg: 'SP',
      cpfAssinatura: '000.000.000-00'
    };

    const maskCurrency = (v) => {
      let val = v.replace(/\D/g, "");
      return (Number(val) / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    };

    const parseValor = (s) => parseFloat(s.replace(/\./g, '').replace(',', '.')) || 0;
    const formatCurrency = (v) => v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    const bindField = (key) => {
      const input = document.getElementById(`in_${key}`);
      const output = document.getElementById(`out_${key}`);
      if (input) {
        input.value = state[key];
        input.addEventListener('input', (e) => {
          state[key] = e.target.value;
          if (output) output.innerText = key === 'estadoRg' ? e.target.value.toUpperCase() : e.target.value;
          if (key === 'rgAssinatura') document.getElementById('out_rg_container').style.display = state.rgAssinatura ? 'block' : 'none';
          if (key === 'cpfAssinatura') document.getElementById('out_cpf_label').innerText = state.cpfAssinatura.replace(/\D/g, '').length > 11 ? 'CNPJ' : 'CPF';
        });
      }
      if (output) output.innerText = key === 'estadoRg' ? state[key].toUpperCase() : state[key];
    };

    const renderMeses = () => {
      const container = document.getElementById('meses_container');
      const table = document.getElementById('out_meses_table');
      container.innerHTML = ''; table.innerHTML = '';
      let total = 0;

      state.meses.forEach((m, index) => {
        const div = document.createElement('div');
        div.className = 'bg-gray-50 p-2 rounded border border-gray-200 mb-2';
        div.innerHTML = `
          <div class="flex gap-1 mb-1">
            <input type="text" value="${m.mes}" data-id="${m.id}" data-field="mes" class="mes-input flex-1 p-1 border rounded text-xs outline-none" />
            <input type="text" value="${m.ano}" data-id="${m.id}" data-field="ano" class="mes-input w-16 p-1 border rounded text-xs outline-none" />
          </div>
          <div class="flex items-center gap-1">
            <input type="text" value="${m.valor}" data-id="${m.id}" data-field="valor" class="mes-input flex-1 p-1 border rounded text-xs outline-none font-mono" />
            <button onclick="removeMes(${m.id})" class="p-1 text-red-500 hover:bg-red-50 rounded"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
          </div>
        `;
        container.appendChild(div);

        table.innerHTML += `
          <tr>
            <td class="w-40 py-[1px]">${m.mes}</td>
            <td class="w-40 py-[1px] text-center">${m.ano}</td>
            <td class="w-5 py-[1px]">R$</td>
            <td class="w-auto py-[1px] text-right pr-4 font-bold">${m.valor}</td>
          </tr>
        `;
        total += parseValor(m.valor);
      });

      table.innerHTML += `
        <tr class="font-bold h-4">
          <td class="py-1">TOTAL:</td><td></td><td>R$</td>
          <td class="py-1 text-right pr-4">${formatCurrency(total)}</td>
        </tr>
      `;
      document.getElementById('out_meses_count').innerText = state.meses.length.toString().padStart(2, '0');
      lucide.createIcons();
    };

    // --- NOVA LOGICA DE PDF USANDO HTML2CANVAS + JSPDF DIRETAMENTE ---
    window.downloadPDF = async () => {
      const btn = document.getElementById('btn-download');
      const btnText = document.getElementById('btn-text');
      const element = document.getElementById('document-page');
      
      btn.disabled = true;
      btnText.innerText = "A processar...";

      // Para evitar problemas de scroll e margens, criamos um clone limpo
      const clone = element.cloneNode(true);
      Object.assign(clone.style, {
        position: 'fixed',
        top: '0',
        left: '0',
        margin: '0',
        boxShadow: 'none',
        zIndex: '-1000'
      });
      document.body.appendChild(clone);

      try {
        const canvas = await html2canvas(clone, {
          scale: 3, // Alta qualidade
          useCORS: true,
          logging: false,
          width: 793.7, // Largura exata de 210mm a 96dpi
          height: 1122.5, // Altura exata de 297mm a 96dpi
          x: 0,
          y: 0
        });

        const imgData = canvas.toDataURL('image/png');
        const pdf = new jsPDF({
          orientation: 'portrait',
          unit: 'mm',
          format: 'a4',
          compress: true
        });

        // Adicionamos a imagem ocupando 100% da folha sem margens do jsPDF
        pdf.addImage(imgData, 'PNG', 0, 0, 210, 297, undefined, 'FAST');
        pdf.save(`Declaracao_Faturamento_${state.empresa.replace(/\s+/g, '_')}.pdf`);

      } catch (err) {
        console.error("Erro no PDF:", err);
      } finally {
        document.body.removeChild(clone);
        btn.disabled = false;
        btnText.innerText = "Baixar PDF";
      }
    };

    document.getElementById('meses_container').addEventListener('input', (e) => {
      if(e.target.classList.contains('mes-input')) {
        const id = parseInt(e.target.getAttribute('data-id'));
        const field = e.target.getAttribute('data-field');
        const mes = state.meses.find(m => m.id === id);
        if(mes) {
          if (field === 'valor') e.target.value = maskCurrency(e.target.value);
          mes[field] = e.target.value;
          renderMeses();
        }
      }
    });

    window.addMes = () => {
      state.meses.push({ id: Date.now(), mes: 'Janeiro', ano: '2026', valor: '0,00' });
      renderMeses();
    };

    window.removeMes = (id) => {
      if(state.meses.length > 1) {
        state.meses = state.meses.filter(m => m.id !== id);
        renderMeses();
      }
    };

    document.addEventListener("DOMContentLoaded", () => {
      lucide.createIcons();
      ['empresa', 'cnpj', 'jucesp', 'ie', 'dataAbertura', 'endereco', 'localData', 'nomeAssinatura', 'rgAssinatura', 'estadoRg', 'cpfAssinatura'].forEach(bindField);
      renderMeses();
    });
  </script>
</body>
</html>

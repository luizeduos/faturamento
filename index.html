<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Declaração de Faturamento</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Bibliotecas Base para PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    @media print {
      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        background-color: white !important;
      }
      @page {
        margin: 0;
      }
      .print-hidden {
        display: none !important;
      }
      #document-page {
        background-image: none !important;
        box-shadow: none !important;
        background-color: white !important;
      }
    }
    
    input:focus {
      border-color: #014167;
      box-shadow: 0 0 0 2px rgba(1, 65, 103, 0.2);
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    
    .title-faturamento {
      text-align: center;
      width: 100%;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body class="min-h-screen bg-gray-100 flex flex-col md:flex-row font-sans text-black">

  <!-- PAINEL DE CONTROLE -->
  <div class="w-full md:w-1/3 lg:w-1/4 bg-white border-r shadow-lg flex flex-col print:hidden h-screen overflow-y-auto">
    <div class="p-4 bg-[#014167] text-white flex flex-col gap-3 sticky top-0 z-10 shadow-md">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <i data-lucide="settings" class="w-8 h-8"></i>
          <h1 class="font-bold">Configurações</h1>
        </div>
      </div>
      
      <div class="flex gap-2">
        <button 
          onclick="window.print()"
          class="flex-1 flex items-center justify-center gap-1 bg-white text-[#014167] px-3 py-2 rounded hover:bg-gray-100 transition text-sm font-bold"
        >
          <i data-lucide="printer" class="w-4 h-4"></i> Imprimir
        </button>
        <button 
          id="btn-download"
          onclick="downloadPDF()"
          class="flex-1 flex items-center justify-center gap-1 bg-green-600 text-white px-3 py-2 rounded hover:bg-green-700 transition text-sm font-bold"
        >
          <i data-lucide="download" class="w-4 h-4"></i> <span id="btn-text">Baixar PDF</span>
        </button>
      </div>
    </div>

    <div class="p-4 space-y-6">
      <section>
        <div class="flex items-center justify-between mb-3 border-b pb-1">
            <h2 class="text-sm font-bold text-gray-500 uppercase flex items-center gap-2">
                <i data-lucide="building" class="w-4 h-4"></i> Dados Gerais
            </h2>
            <label class="flex items-center gap-2 cursor-pointer">
                <span class="text-[10px] font-bold text-blue-600 uppercase">Consolidado</span>
                <input type="checkbox" id="in_consolidado" class="sr-only peer">
                <div class="w-8 h-4 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-blue-600 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all relative"></div>
            </label>
        </div>
        
        <div class="space-y-3">
          <input type="text" id="in_empresa" placeholder="Nome da Empresa" class="w-full p-2 border rounded text-sm outline-none font-bold" />
          <input type="text" id="in_ie" placeholder="Inscrição Estadual" class="w-full p-2 border rounded text-sm outline-none" />
          <input type="text" id="in_endereco" placeholder="Endereço Completo" class="w-full p-2 border rounded text-sm outline-none" />
          <input type="text" id="in_localData" placeholder="Local e Data de Emissão (Rodapé)" class="w-full p-2 border rounded text-sm outline-none" />
        </div>
      </section>

      <section>
        <h2 class="text-sm font-bold text-gray-500 uppercase flex items-center gap-2 mb-3 border-b pb-1">
          <i data-lucide="layers" class="w-4 h-4"></i> <span id="title_unidades">Unidade / CNPJ</span>
        </h2>
        <div id="unidades_container" class="space-y-3"></div>
        <button id="btn_add_unidade" onclick="addUnidade()" class="w-full mt-2 py-2 border-2 border-dashed border-blue-300 text-blue-500 rounded hover:bg-blue-50 text-sm font-bold uppercase transition">
          + Adicionar Unidade
        </button>
      </section>

      <section>
        <h2 class="text-sm font-bold text-gray-500 uppercase flex items-center gap-2 mb-3 border-b pb-1">
          <i data-lucide="file-text" class="w-4 h-4"></i> Meses de Faturamento
        </h2>
        <div id="meses_container"></div>
        <button onclick="addMes()" class="w-full mt-2 py-2 border-2 border-dashed border-gray-300 text-gray-500 rounded hover:bg-gray-50 text-sm font-bold uppercase">
          + Adicionar Mês
        </button>
      </section>

      <section>
        <h2 class="text-sm font-bold text-gray-500 uppercase flex items-center gap-2 mb-3 border-b pb-1">
          <i data-lucide="pen-tool" class="w-4 h-4"></i> Segunda Assinatura
        </h2>
        <div class="bg-blue-50 p-3 rounded border border-blue-100 space-y-2">
          <input type="text" id="in_nomeAssinatura" placeholder="Nome do Cliente (Vazio p/ centralizar contador)" class="w-full p-2 border rounded text-sm outline-none" />
          <div class="flex gap-2">
            <input type="text" id="in_rgAssinatura" placeholder="RG" class="w-2/3 p-2 border rounded text-sm outline-none" />
            <input type="text" id="in_estadoRg" placeholder="UF" class="w-1/3 p-2 border rounded text-sm outline-none uppercase" maxlength="2" />
          </div>
          <input type="text" id="in_cpfAssinatura" placeholder="CPF/CNPJ" class="w-full p-2 border rounded text-sm outline-none" />
        </div>
      </section>
      <div class="pb-10"></div>
    </div>
  </div>

  <!-- ÁREA DO DOCUMENTO -->
  <div id="document-wrapper" class="flex-1 overflow-y-auto bg-gray-300 print:bg-white flex justify-center p-4 sm:p-8 print:p-0">
    <div 
      id="document-page"
      class="bg-white shadow-2xl print:shadow-none relative flex flex-col mx-auto"
      style="width: 210mm; min-height: 297mm; padding: 35mm 20mm 20mm 20mm; box-sizing: border-box; background-image: url('Timbrado.png'); background-size: 100% 100%; background-position: center; background-repeat: no-repeat; font-family: 'Times New Roman', Times, serif;"
    >
      
      <!-- Título Superior (Centralizado - Apenas Consolidado) -->
      <div id="out_top_title" class="title-faturamento mb-6 hidden">
        <h1>FATURAMENTO</h1>
      </div>

      <div id="out_header_details" class="mb-6 text-[15px] leading-[1.4]">
        <p><span>Empresa:</span> <span id="out_empresa" class="font-bold"></span></p>
        
        <!-- Bloco para Dados Simples (Quando não consolidado) -->
        <div id="out_simple_details">
            <p><span>C.N.P.J.:</span> <span id="out_simple_cnpj" class="font-bold"></span></p>
            <p><span>Jucesp:</span> <span id="out_simple_jucesp" class="font-bold"></span></p>
            <p><span>Insc. Estadual:</span> <span id="out_ie" class="font-bold"></span></p>
            <p><span>Data:</span> <span id="out_simple_data" class="font-bold"></span></p>
        </div>

        <p><span>Endereço:</span> <span id="out_endereco" class="font-bold"></span></p>
        
        <!-- Área Dinâmica de Unidades (Apenas Consolidado) -->
        <div id="out_unidades_list" class="mt-4 space-y-1"></div>
      </div>

      <!-- Título Intermediário (Centralizado - Apenas Simples) -->
      <div id="out_mid_title" class="title-faturamento mb-6">
        <h1>FATURAMENTO</h1>
      </div>

      <div class="mb-6">
        <h2 class="font-bold text-[15px] mb-4 text-center uppercase">
            <span id="out_table_title">RECEITA FISCAL</span> - ÚLTIMOS <span id="out_meses_count"></span> MESES
        </h2>
        <table class="w-full max-w-[500px] mx-auto text-[15px]">
          <tbody id="out_meses_table"></tbody>
        </table>
      </div>

      <div class="mb-8 text-[15px] font-bold italic text-center" style="font-family: Calibri, sans-serif;">
        <p id="out_localData"></p>
      </div>

      <!-- CONTAINER DE ASSINATURAS -->
      <div id="out_signature_container" class="flex justify-between text-[15px] px-2 pb-4 mt-auto mb-10" style="font-family: Calibri, sans-serif;">
        
        <!-- Assinatura Contador -->
        <div id="sig_contador" class="w-[250px] flex flex-col items-center text-center">
          <div class="w-full border-t border-black mb-1"></div>
          <p class="font-bold">Reynaldo da Silva Moraes</p>
          <p class="font-bold">CRC: 1SP188092/O-4</p>
          <p class="font-bold">CPF: 154.274.198-02</p>
        </div>

        <!-- Assinatura Cliente -->
        <div id="sig_cliente" class="w-[250px] flex flex-col items-center text-center">
          <div class="w-full border-t border-black mb-1"></div>
          <p class="font-bold" id="out_nomeAssinatura"></p>
          <p class="font-bold" id="out_rg_container">RG: <span id="out_rgAssinatura"></span>/<span id="out_estadoRg"></span></p>
          <p class="font-bold"><span id="out_cpf_label">CPF</span>: <span id="out_cpfAssinatura"></span></p>
        </div>

      </div>
    </div>
  </div>

  <script>
    const { jsPDF } = window.jspdf;

    const state = {
      empresa: 'NOME EXEMPLO',
      ie: '000.000.000.000',
      endereco: 'Rua, 00 - Bairro - Cidade/UF',
      localData: 'São Miguel Arcanjo, 05 de Março de 2026',
      consolidado: false,
      unidades: [
        { id: 1, cnpj: '00.000.000/0000-00', jucesp: '00.000.000.000', data: '00/00/0000' }
      ],
      meses: [
        { id: 1, mes: 'Janeiro', ano: '2026', valor: '0,00' },
      ],
      nomeAssinatura: '', 
      rgAssinatura: '00.000.000-0',
      estadoRg: 'SP',
      cpfAssinatura: '000.000.000-00'
    };

    const maskCurrency = (v) => {
      let val = v.replace(/\D/g, "");
      return (Number(val) / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    };

    const parseValor = (s) => parseFloat(s.replace(/\./g, '').replace(',', '.')) || 0;
    const formatCurrency = (v) => v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    const bindField = (key) => {
      const input = document.getElementById(`in_${key}`);
      const output = document.getElementById(`out_${key}`);
      if (!input) return;

      if (input.type === 'checkbox') {
        input.checked = state[key];
        input.addEventListener('change', (e) => {
          state[key] = e.target.checked;
          updateLayoutMode();
        });
      } else {
        input.value = state[key];
        input.addEventListener('input', (e) => {
          state[key] = e.target.value;
          if (output) output.innerText = key === 'estadoRg' ? e.target.value.toUpperCase() : e.target.value;
          
          if (key === 'nomeAssinatura') updateSignatureLayout();
          if (key === 'cpfAssinatura') {
              const label = document.getElementById('out_cpf_label');
              if (label) label.innerText = state.cpfAssinatura.replace(/\D/g, '').length > 11 ? 'CNPJ' : 'CPF';
          }
        });
      }
      if (output) output.innerText = key === 'estadoRg' ? state[key].toUpperCase() : state[key];
    };

    const updateLayoutMode = () => {
        const isConsolidado = state.consolidado;
        
        const topTitle = document.getElementById('out_top_title');
        const midTitle = document.getElementById('out_mid_title');
        const simpleDetails = document.getElementById('out_simple_details');
        const unitsList = document.getElementById('out_unidades_list');
        const tableTitle = document.getElementById('out_table_title');
        
        const btnAdd = document.getElementById('btn_add_unidade');
        const titleUnidades = document.getElementById('title_unidades');

        if (isConsolidado) {
            topTitle.classList.remove('hidden');
            midTitle.classList.add('hidden');
            simpleDetails.classList.add('hidden');
            unitsList.classList.remove('hidden');
            tableTitle.innerText = 'RECEITA FISCAL CONSOLIDADA';
            btnAdd.classList.remove('hidden');
            titleUnidades.innerText = 'Unidades / Filiais';
        } else {
            topTitle.classList.add('hidden');
            midTitle.classList.remove('hidden');
            simpleDetails.classList.remove('hidden');
            unitsList.classList.add('hidden');
            tableTitle.innerText = 'RECEITA FISCAL';
            btnAdd.classList.add('hidden');
            titleUnidades.innerText = 'Dados do CNPJ';
            
            if (state.unidades.length > 1) {
                state.unidades = [state.unidades[0]];
                renderUnidades();
            }
        }
        renderUnidadesDocOnly();
    };

    const updateSignatureLayout = () => {
        const container = document.getElementById('out_signature_container');
        const sigCliente = document.getElementById('sig_cliente');
        if (!state.nomeAssinatura || state.nomeAssinatura.trim() === "") {
            container.classList.remove('justify-between');
            container.classList.add('justify-center');
            sigCliente.classList.add('hidden');
        } else {
            container.classList.remove('justify-center');
            container.classList.add('justify-between');
            sigCliente.classList.remove('hidden');
        }
    };

    const renderUnidades = () => {
        const container = document.getElementById('unidades_container');
        container.innerHTML = '';
        
        state.unidades.forEach(u => {
            const card = document.createElement('div');
            card.className = 'bg-blue-50 p-2 rounded border border-blue-100 space-y-2 relative group';
            card.innerHTML = `
                ${state.consolidado ? `<button onclick="removeUnidade(${u.id})" class="absolute top-1 right-1 p-1 text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition"><i data-lucide="x-circle" class="w-4 h-4"></i></button>` : ''}
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" value="${u.cnpj}" placeholder="CNPJ" oninput="updateUnidade(${u.id}, 'cnpj', this.value)" class="p-1 border rounded text-xs outline-none font-bold" />
                    <input type="text" value="${u.jucesp}" placeholder="Jucesp" oninput="updateUnidade(${u.id}, 'jucesp', this.value)" class="p-1 border rounded text-xs outline-none" />
                </div>
                <input type="text" value="${u.data}" placeholder="Data de Abertura" oninput="updateUnidade(${u.id}, 'data', this.value)" class="w-full p-1 border rounded text-xs outline-none" />
            `;
            container.appendChild(card);
        });
        
        renderUnidadesDocOnly();
        lucide.createIcons();
    };

    window.addUnidade = () => {
        state.unidades.push({ id: Date.now(), cnpj: '', jucesp: '', data: '' });
        renderUnidades();
    };

    window.removeUnidade = (id) => {
        if (state.unidades.length > 1) {
            state.unidades = state.unidades.filter(u => u.id !== id);
            renderUnidades();
        }
    };

    window.updateUnidade = (id, field, value) => {
        const unit = state.unidades.find(u => u.id === id);
        if (unit) {
            unit[field] = value;
            renderUnidadesDocOnly();
        }
    };

    const renderUnidadesDocOnly = () => {
        const list = document.getElementById('out_unidades_list');
        const simpleCnpj = document.getElementById('out_simple_cnpj');
        const simpleJucesp = document.getElementById('out_simple_jucesp');
        const simpleData = document.getElementById('out_simple_data');
        
        list.innerHTML = '';
        
        state.unidades.forEach((u, index) => {
            if (index === 0) {
                simpleCnpj.innerText = u.cnpj;
                simpleJucesp.innerText = u.jucesp;
                simpleData.innerText = u.data;
            }

            list.innerHTML += `
                <div class="grid grid-cols-[1.2fr_1fr_1fr] gap-4 py-0.5">
                    <p><span>C.N.P.J.:</span> <span class="font-bold">${u.cnpj}</span></p>
                    <p><span>Jucesp:</span> <span class="font-bold">${u.jucesp}</span></p>
                    <p><span>Data:</span> <span class="font-bold">${u.data}</span></p>
                </div>
            `;
        });
    };

    const renderMeses = () => {
      const container = document.getElementById('meses_container');
      container.innerHTML = '';
      
      state.meses.forEach((m) => {
        const div = document.createElement('div');
        div.className = 'bg-gray-50 p-2 rounded border border-gray-200 mb-2';
        div.innerHTML = `
          <div class="flex gap-1 mb-1">
            <input type="text" value="${m.mes}" oninput="updateMes(${m.id}, 'mes', this.value)" class="flex-1 p-1 border rounded text-xs outline-none" />
            <input type="text" value="${m.ano}" oninput="updateMes(${m.id}, 'ano', this.value)" class="w-16 p-1 border rounded text-xs outline-none" />
          </div>
          <div class="flex items-center gap-1">
            <input type="text" value="${m.valor}" oninput="updateMes(${m.id}, 'valor', this.value, true)" class="flex-1 p-1 border rounded text-xs outline-none font-mono" />
            <button onclick="removeMes(${m.id})" class="p-1 text-red-500 hover:bg-red-50 rounded"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
          </div>
        `;
        container.appendChild(div);
      });

      renderMesesTableOnly();
      lucide.createIcons();
    };

    window.addMes = () => {
      const last = state.meses[state.meses.length - 1];
      state.meses.push({ id: Date.now(), mes: 'Mês', ano: last ? last.ano : '2026', valor: '0,00' });
      renderMeses();
    };

    window.removeMes = (id) => {
      if(state.meses.length > 1) {
        state.meses = state.meses.filter(m => m.id !== id);
        renderMeses();
      }
    };

    window.updateMes = (id, field, value, isCurrency = false) => {
        const mes = state.meses.find(m => m.id === id);
        if (mes) {
            if (isCurrency) {
                value = maskCurrency(value);
                event.target.value = value;
            }
            mes[field] = value;
            renderMesesTableOnly();
        }
    };

    const renderMesesTableOnly = () => {
        const table = document.getElementById('out_meses_table');
        table.innerHTML = '';
        let total = 0;
        state.meses.forEach(m => {
            table.innerHTML += `
              <tr>
                <td class="w-40 py-[1px] text-[15px]">${m.mes}</td>
                <td class="w-40 py-[1px] text-center text-[15px]">${m.ano}</td>
                <td class="w-5 py-[1px] text-[15px]">R$</td>
                <td class="w-auto py-[1px] text-right pr-4 font-bold text-[15px]">${m.valor}</td>
              </tr>`;
            total += parseValor(m.valor);
        });
        table.innerHTML += `<tr class="font-bold h-4 text-[15px]"><td class="py-1">TOTAL:</td><td></td><td>R$</td><td class="py-1 text-right pr-4">${formatCurrency(total)}</td></tr>`;
        document.getElementById('out_meses_count').innerText = state.meses.length.toString().padStart(2, '0');
    }

    window.downloadPDF = async () => {
      const btn = document.getElementById('btn-download');
      const element = document.getElementById('document-page');
      btn.disabled = true;
      const originalText = btn.innerHTML;
      btn.innerHTML = "A processar...";
      const clone = element.cloneNode(true);
      Object.assign(clone.style, { position: 'fixed', top: '0', left: '0', margin: '0', boxShadow: 'none', zIndex: '-1000' });
      document.body.appendChild(clone);
      try {
        const canvas = await html2canvas(clone, { scale: 3, useCORS: true, logging: false, width: 793.7, height: 1122.5 });
        const imgData = canvas.toDataURL('image/png');
        const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        pdf.addImage(imgData, 'PNG', 0, 0, 210, 297);
        pdf.save(`Declaracao_Faturamento.pdf`);
      } catch (err) { console.error(err); } finally {
        document.body.removeChild(clone);
        btn.disabled = false;
        btn.innerHTML = originalText;
      }
    };

    document.addEventListener("DOMContentLoaded", () => {
      lucide.createIcons();
      ['empresa', 'ie', 'endereco', 'localData', 'consolidado', 'nomeAssinatura', 'rgAssinatura', 'estadoRg', 'cpfAssinatura'].forEach(bindField);
      updateLayoutMode();
      renderUnidades();
      renderMeses();
      updateSignatureLayout();
    });
  </script>
</body>
</html>
